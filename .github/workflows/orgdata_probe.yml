
name: OrgDataProbe
on:
  push:
    branches: [orgdata-probe-public2-1772585941]
permissions:
  contents: write
jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run probe
        run: |
          python orgdata_probe.py || true
          cat orgdata_probe_result.json || true
      - name: Commit results
        if: always()
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add orgdata_probe.py .github/workflows/orgdata_probe.yml orgdata_probe_result.json || true
          git commit -m "Run orgData probe" || exit 0
          for i in 1 2 3 4 5 6; do
            git pull --rebase origin orgdata-probe-public2-1772585941 && git push origin HEAD:orgdata-probe-public2-1772585941 && exit 0 || true
            sleep 15
          done
          exit 0
