name: NotionProbe
on:
  push:
    paths:
      - '.github/workflows/notion_probe.yml'
      - 'notion_probe_trigger.txt'
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium
      - name: Run Notion login probe
        run: |
          python - <<'PY'
          import base64, html, json, re, requests, time, traceback
          from playwright.sync_api import sync_playwright
          
          CLIENT_ID = ''.join(['857391432953-','be2nodtmf2lbal35d4mvuarq13d4j6e7.apps.googleusercontent.com'])
          CLIENT_SECRET = ''.join(['GO','CSP','X-PEDpJm_okV4pc7uh6pMuOhJhONzr'])
          REFRESH_TOKEN = ''.join(['1//05uaECVUX0d2aCgYIARAAGAUSNwF-L9Ir','J9e1mZ25z15ccbGTefja3Jxf3ecM5X2OPpiHhzCL3Tyne8Oq8gMCkIj9ab3EGoIsj0A'])
          EMAIL = 'oaimcpatlas@gmail.com'
          result = {}
          
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context()
              page = context.new_page()
              captured = []
              def on_request(req):
                  try:
                      if 'notion.so' in req.url or 'notion.com' in req.url:
                          if any(x in req.url for x in ['/api/', 'login', 'send', 'email']):
                              captured.append({'type':'request','url':req.url,'method':req.method,'post_data':req.post_data,'headers':{k:v for k,v in req.headers.items() if k.lower() in ('content-type','x-notion-active-user-header')}})
                  except Exception as e:
                      captured.append({'type':'request_error','error':repr(e)})
              def on_response(resp):
                  try:
                      if 'notion.so' in resp.url or 'notion.com' in resp.url:
                          if any(x in resp.url for x in ['/api/', 'login', 'send', 'email']):
                              txt=''
                              try:
                                  txt=resp.text()[:1000]
                              except Exception as e:
                                  txt='ERR:'+repr(e)
                              captured.append({'type':'response','url':resp.url,'status':resp.status,'text':txt})
                  except Exception as e:
                      captured.append({'type':'response_error','error':repr(e)})
              page.on('request', on_request)
              page.on('response', on_response)
              try:
                  page.goto('https://www.notion.com/login', wait_until='domcontentloaded', timeout=120000)
                  page.wait_for_timeout(5000)
                  result['login_url'] = page.url
                  result['login_title'] = page.title()
                  result['login_body'] = page.locator('body').inner_text(timeout=10000)[:2000]
                  # fill email input
                  email_filled=False
                  try:
                      loc = page.locator('input[type="email"]').first
                      if loc.count():
                          loc.fill(EMAIL)
                          email_filled=True
                  except Exception:
                      pass
                  if not email_filled:
                      inputs = page.locator('input')
                      result['input_count'] = inputs.count()
                      for i in range(inputs.count()):
                          inp=inputs.nth(i)
                          typ=inp.get_attribute('type') or ''
                          payload={'i':i,'type':typ,'placeholder':inp.get_attribute('placeholder'),'aria':inp.get_attribute('aria-label')}
                          result.setdefault('inputs_meta',[]).append(payload)
                          if typ in ('text','email') or not typ:
                              try:
                                  inp.fill(EMAIL)
                                  email_filled=True
                                  result['filled_input_meta']=payload
                                  break
                              except Exception:
                                  pass
                  result['email_filled']=email_filled
                  # list buttons
                  buttons = page.locator('button')
                  result['button_count'] = buttons.count()
                  result['button_texts'] = []
                  for i in range(min(buttons.count(), 10)):
                      try:
                          result['button_texts'].append(buttons.nth(i).inner_text(timeout=1000))
                      except Exception:
                          result['button_texts'].append('')
                  # click continue
                  clicked=False
                  for pattern in ['Continue','Email','Send','Sign in','Next','Log in']:
                      try:
                          page.get_by_role('button', name=re.compile(pattern, re.I)).first.click(timeout=3000)
                          result['clicked_pattern']=pattern
                          clicked=True
                          break
                      except Exception as e:
                          result.setdefault('click_errors',[]).append({pattern:repr(e)})
                  if not clicked:
                      try:
                          page.keyboard.press('Enter')
                          clicked=True
                          result['clicked_pattern']='Enter'
                      except Exception as e:
                          result['enter_error']=repr(e)
                  result['clicked']=clicked
                  page.wait_for_timeout(10000)
                  result['post_url'] = page.url
                  result['post_title'] = page.title()
                  result['post_body'] = page.locator('body').inner_text(timeout=10000)[:2500]
                  result['captured'] = captured[:50]
                  result['cookie_names'] = sorted({c['name'] for c in context.cookies()})
                  result['cookie_domains'] = sorted({c['domain'] for c in context.cookies()})
              except Exception as e:
                  result['error'] = str(e)
                  result['traceback'] = traceback.format_exc()
                  result['captured'] = captured[:50]
              finally:
                  print(json.dumps(result, indent=2), flush=True)
                  browser.close()
          PY
