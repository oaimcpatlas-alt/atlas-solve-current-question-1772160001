
name: SolveBonusLive

on:
  push:
    branches: [bonus-directauth-clean-1772428000]
    paths-ignore:
      - 'bonus_answer.json'
      - 'bonus_auth_live.json'
      - 'bonus_browser_state.json'
      - 'browser_cookies.json'

permissions:
  contents: write

jobs:
  solve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          python -m pip install requests playwright >/dev/null 2>&1 || true
          python -m playwright install chromium >/dev/null 2>&1 || true
          npm init -y >/dev/null 2>&1 || true
          npm install mongodb ws >/dev/null 2>&1
      - name: Authenticate to MongoDB Cloud and capture browser cookies
        run: |
          python scripts/bonus_auth_live.py || true
          cat bonus_auth_live.json || true
      - name: Query Atlas data and compute bonus answer
        run: |
          node scripts/bonus_query_live.js || true
          cat bonus_answer.json || true
      - name: Commit results
        if: always()
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .github/workflows/bonus_discovery.yml scripts/bonus_auth_live.py scripts/bonus_query_live.js bonus_auth_live.json bonus_browser_state.json bonus_answer.json browser_cookies.json cookie_header.txt bonus_request_cookies.json || true
          git commit -m "Run live bonus solver" || exit 0
          for i in 1 2 3 4 5 6; do
            git pull --rebase origin bonus-directauth-clean-1772428000 && git push origin HEAD:bonus-directauth-clean-1772428000 && exit 0 || true
            sleep 15
          done
          exit 0
