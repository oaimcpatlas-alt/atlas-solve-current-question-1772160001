
name: furnished-4br-stats-secret

on:
  push:
    branches: [ solve-furnished-4br-secret ]
    paths:
      - '.github/workflows/furnished_4br_stats_secret.yml'
      - 'furnished_4br_secret_query.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: python -m pip install requests
      - name: Run query
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python furnished_4br_secret_query.py
      - name: Commit result
        if: always()
        run: |
          test -f answer.json || echo '{}' > answer.json
          test -f summary.json || echo '{}' > summary.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add answer.json summary.json furnished_4br_secret_query.py .github/workflows/furnished_4br_stats_secret.yml
          git commit -m "Update furnished 4BR secret stats answer" || exit 0
          git pull --rebase --autostash origin "$GITHUB_REF_NAME" || true
          git push origin HEAD:"$GITHUB_REF_NAME"
