
name: HousingAverageRentAnswer
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/housing_average_rent_answer.yml'
      - 'housing_query.js'

permissions:
  contents: write

jobs:
  solve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          python -m pip install requests playwright >/dev/null 2>&1
          python -m playwright install --with-deps chromium >/dev/null
          npm install mongodb ws >/dev/null 2>&1

      - name: Authenticate to Atlas and export browser cookies
        run: |
          python - <<'PY'
          import os, re, json, time, base64, traceback, requests, secrets, string
          from urllib.parse import urlparse, parse_qs
          from playwright.sync_api import sync_playwright

          EMAIL = 'oaimcpatlas@gmail.com'
          GROUP_URL = 'https://cloud.mongodb.com/v2/699c12be8df98bd863d63d70#/overview'
          OUT = {'started_at': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())}

          CLIENT_ID = os.getenv('GOOGLE_CLIENT_ID') or ''
          CLIENT_SECRET = os.getenv('GOOGLE_CLIENT_SECRET') or ''
          REFRESH_TOKEN = os.getenv('GOOGLE_REFRESH_TOKEN') or ''
          OUT['has_google_client_id'] = bool(CLIENT_ID)
          OUT['has_google_client_secret'] = bool(CLIENT_SECRET)
          OUT['has_google_refresh_token'] = bool(REFRESH_TOKEN)

          def save():
              with open('housing_auth_debug.json', 'w', encoding='utf-8') as f:
                  json.dump(OUT, f, indent=2)

          def refresh_access_token():
              r = requests.post(
                  'https://oauth2.googleapis.com/token',
                  data={
                      'client_id': CLIENT_ID,
                      'client_secret': CLIENT_SECRET,
                      'refresh_token': REFRESH_TOKEN,
                      'grant_type': 'refresh_token',
                  },
                  timeout=30,
              )
              OUT['gmail_token_status'] = r.status_code
              OUT['gmail_token_text'] = r.text[:500]
              r.raise_for_status()
              return r.json()['access_token']

          def gmail_list(query, max_results=20):
              tok = refresh_access_token()
              r = requests.get(
                  'https://gmail.googleapis.com/gmail/v1/users/me/messages',
                  params={'q': query, 'maxResults': max_results},
                  headers={'Authorization': f'Bearer {tok}'},
                  timeout=30,
              )
              OUT.setdefault('gmail_list_statuses', []).append({'query': query, 'status': r.status_code})
              r.raise_for_status()
              return r.json().get('messages') or []

          def gmail_get(mid):
              tok = refresh_access_token()
              r = requests.get(
                  f'https://gmail.googleapis.com/gmail/v1/users/me/messages/{mid}',
                  params={'format': 'full'},
                  headers={'Authorization': f'Bearer {tok}'},
                  timeout=30,
              )
              OUT.setdefault('gmail_get_statuses', []).append({'id': mid, 'status': r.status_code})
              r.raise_for_status()
              return r.json()

          def extract_text(detail):
              def walk(part):
                  res = []
                  body = part.get('body', {})
                  data = body.get('data')
                  if data:
                      try:
                          decoded = base64.urlsafe_b64decode(data + '===').decode('utf-8', errors='ignore')
                          res.append(decoded)
                      except Exception:
                          pass
                  for p in part.get('parts', []) or []:
                      res.extend(walk(p))
                  return res
              return '\n'.join(walk(detail.get('payload', {})))

          def latest_reset_details(max_results=20):
              items = []
              for msg in gmail_list('from:cloud-manager-support@mongodb.com subject:"Password Reset"', max_results):
                  try:
                      detail = gmail_get(msg['id'])
                      txt = extract_text(detail)
                      m = re.search(r'https://account\.mongodb\.com/account/reset/password/([A-Za-z0-9]+)\?email=', txt)
                      items.append({
                          'id': msg['id'],
                          'internalDate': int(detail.get('internalDate') or 0),
                          'token': m.group(1) if m else None,
                          'snippet': detail.get('snippet', '')[:160],
                      })
                  except Exception as e:
                      items.append({'id': msg['id'], 'error': repr(e)})
              items.sort(key=lambda x: x.get('internalDate', 0), reverse=True)
              return items

          def latest_code_details(max_results=20):
              items = []
              for msg in gmail_list('from:mongodb-account@mongodb.com subject:"MongoDB verification code"', max_results):
                  try:
                      detail = gmail_get(msg['id'])
                      txt = extract_text(detail)
                      m = re.search(r'(\d{6})', txt)
                      items.append({
                          'id': msg['id'],
                          'internalDate': int(detail.get('internalDate') or 0),
                          'code': m.group(1) if m else None,
                          'snippet': detail.get('snippet', '')[:160],
                      })
                  except Exception as e:
                      items.append({'id': msg['id'], 'error': repr(e)})
              items.sort(key=lambda x: x.get('internalDate', 0), reverse=True)
              return items

          def gen_password():
              alphabet = string.ascii_letters + string.digits + '!@#$%^&*()-_=+[]{}'
              while True:
                  pw = 'Aa1!Housing#' + ''.join(secrets.choice(alphabet) for _ in range(12))
                  if re.search(r'[A-Z]', pw) and re.search(r'[a-z]', pw) and re.search(r'\d', pw) and re.search(r'[^A-Za-z0-9]', pw):
                      return pw

          try:
              before_resets = latest_reset_details(12)
              before_codes = latest_code_details(12)
              before_reset_ids = {x['id'] for x in before_resets if x.get('id')}
              before_code_ids = {x['id'] for x in before_codes if x.get('id')}
              OUT['before_reset_ids'] = list(before_reset_ids)[:12]
              OUT['before_code_ids'] = list(before_code_ids)[:12]

              new_password = gen_password()
              OUT['generated_password'] = new_password
              save()

              session = requests.Session()
              session.headers.update({'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json'})

              reset_req = None
              for attempt in range(1, 8):
                  r = session.post(
                      'https://account.mongodb.com/account/resetPasswordRequest',
                      json={'username': EMAIL},
                      timeout=30,
                  )
                  OUT.setdefault('reset_request_attempts', []).append({'attempt': attempt, 'status': r.status_code, 'text': r.text[:500]})
                  if r.status_code == 200 and 'NONE' in r.text:
                      reset_req = r
                      break
                  if 'RATE_LIMITED' in r.text:
                      time.sleep(40)
                  else:
                      time.sleep(5)
              if reset_req is None:
                  raise RuntimeError('reset password request failed')

              reset_token = None
              reset_item = None
              deadline = time.time() + 180
              while time.time() < deadline and reset_token is None:
                  cur = latest_reset_details(12)
                  OUT['reset_snapshot'] = cur[:6]
                  for item in cur:
                      if item.get('token') and item.get('id') not in before_reset_ids:
                          reset_token = item['token']
                          reset_item = item
                          break
                  if reset_token is None:
                      time.sleep(6)
              if reset_token is None:
                  cur = latest_reset_details(12)
                  for item in cur:
                      if item.get('token'):
                          reset_token = item['token']
                          reset_item = item
                          break
              OUT['chosen_reset'] = reset_item
              if not reset_token:
                  raise RuntimeError('could not get reset token from Gmail')

              complete = None
              state_token = None
              for attempt in range(1, 8):
                  r = session.post(
                      'https://account.mongodb.com/account/resetPasswordComplete',
                      json={
                          'username': EMAIL,
                          'password': new_password,
                          'passwordConfirm': new_password,
                          'tempId': reset_token,
                      },
                      timeout=30,
                  )
                  OUT.setdefault('reset_complete_attempts', []).append({'attempt': attempt, 'status': r.status_code, 'text': r.text[:800]})
                  try:
                      body = r.json()
                  except Exception:
                      body = {}
                  login_redirect = body.get('loginRedirect', '')
                  m = re.search(r'stateToken=([^&]+)', login_redirect)
                  if m:
                      complete = r
                      state_token = m.group(1)
                      break
                  if 'RATE_LIMITED' in r.text:
                      time.sleep(40)
                  else:
                      # fallback: auth/verify after reset
                      vr = session.post(
                          'https://account.mongodb.com/account/auth/verify',
                          json={'username': EMAIL, 'password': new_password},
                          timeout=30,
                      )
                      OUT.setdefault('verify_after_reset', []).append({'attempt': attempt, 'status': vr.status_code, 'text': vr.text[:800]})
                      try:
                          vbody = vr.json()
                      except Exception:
                          vbody = {}
                      login_redirect = vbody.get('loginRedirect', '')
                      m = re.search(r'stateToken=([^&]+)', login_redirect)
                      if m:
                          complete = vr
                          state_token = m.group(1)
                          break
                      time.sleep(5)
              OUT['state_token_present'] = bool(state_token)
              if not state_token:
                  raise RuntimeError('missing state token after password reset')

              r = session.get(f'https://account.mongodb.com/account/auth/mfa/{state_token}', timeout=30)
              OUT['mfa_get'] = {'status': r.status_code, 'text': r.text[:1200]}
              r.raise_for_status()
              mfa = r.json()
              factors = (mfa.get('_embedded') or {}).get('factors') or []
              factor = next((f for f in factors if f.get('factorType') == 'email'), factors[0] if factors else {})
              factor_id = factor.get('id')
              factor_type = factor.get('factorType')
              OUT['factor'] = {'id': factor_id, 'type': factor_type}
              if not factor_id:
                  raise RuntimeError('missing MFA factor')

              r = session.post(
                  'https://account.mongodb.com/account/auth/mfa/verify/resend',
                  json={'stateToken': state_token, 'factorId': factor_id, 'factorType': factor_type},
                  timeout=30,
              )
              OUT['mfa_resend'] = {'status': r.status_code, 'text': r.text[:800]}

              code_item = None
              deadline = time.time() + 180
              while time.time() < deadline and code_item is None:
                  cur = latest_code_details(12)
                  OUT['code_snapshot'] = cur[:6]
                  for item in cur:
                      if item.get('code') and item.get('id') not in before_code_ids:
                          code_item = item
                          break
                  if code_item is None:
                      time.sleep(6)
              if code_item is None:
                  cur = latest_code_details(12)
                  for item in cur:
                      if item.get('code'):
                          code_item = item
                          break
              OUT['chosen_code'] = code_item
              if not code_item or not code_item.get('code'):
                  raise RuntimeError('could not get MFA code from Gmail')

              login_redirect = None
              for attempt in range(1, 6):
                  r = session.post(
                      'https://account.mongodb.com/account/auth/mfa/verify',
                      json={
                          'stateToken': state_token,
                          'factorId': factor_id,
                          'factorType': factor_type,
                          'passcode': code_item['code'],
                          'rememberDevice': True,
                      },
                      timeout=30,
                  )
                  OUT.setdefault('mfa_verify_attempts', []).append({'attempt': attempt, 'status': r.status_code, 'text': r.text[:1200]})
                  try:
                      body = r.json()
                  except Exception:
                      body = {}
                  login_redirect = body.get('loginRedirect')
                  if login_redirect:
                      break
                  if 'RATE_LIMITED' in r.text:
                      time.sleep(40)
                  else:
                      time.sleep(5)
              OUT['login_redirect_present'] = bool(login_redirect)
              if not login_redirect:
                  raise RuntimeError('missing login redirect after MFA verification')

              r = session.get(
                  login_redirect,
                  allow_redirects=True,
                  headers={'User-Agent':'Mozilla/5.0','Accept':'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'},
                  timeout=60,
              )
              OUT['auth_follow'] = {
                  'status': r.status_code,
                  'url': r.url,
                  'history': [{'status': h.status_code, 'url': h.url, 'location': h.headers.get('location')} for h in r.history],
                  'text_snippet': r.text[:500],
              }

              # Seed browser with session cookies.
              seed_cookies = []
              for c in session.cookies:
                  item = {
                      'name': c.name,
                      'value': c.value,
                      'domain': c.domain,
                      'path': c.path or '/',
                      'secure': bool(c.secure),
                      'httpOnly': False,
                  }
                  if c.expires:
                      item['expires'] = c.expires
                  seed_cookies.append(item)
              OUT['seed_cookie_count'] = len(seed_cookies)

              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context(
                      user_agent='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36'
                  )
                  if seed_cookies:
                      sane = []
                      for c in seed_cookies:
                          x = dict(c)
                          exp = x.get('expires')
                          if isinstance(exp, (int, float)) and exp <= 0:
                              x.pop('expires', None)
                          sane.append(x)
                      context.add_cookies(sane)

                  page = context.new_page()
                  responses = []

                  def on_response(resp):
                      try:
                          ct = resp.headers.get('content-type', '')
                      except Exception:
                          ct = ''
                      if 'mongodb.com' in resp.url and ('json' in ct or 'html' in ct):
                          try:
                              txt = resp.text()[:600]
                          except Exception:
                              txt = ''
                          responses.append({'url': resp.url, 'status': resp.status, 'text': txt})
                  page.on('response', on_response)

                  page.goto(login_redirect, wait_until='domcontentloaded', timeout=120000)
                  page.wait_for_timeout(12000)
                  page.goto(GROUP_URL, wait_until='domcontentloaded', timeout=120000)
                  page.wait_for_timeout(12000)

                  clicked = []
                  for label in [
                      'Skip personalization', 'Skip for now', 'Got it', 'Dismiss', 'Close',
                      'Add Current IP Address', 'Allow Access From Current IP Address',
                      'Add Current IP', 'Add IP Address', 'Allow Access', 'Confirm', 'Save', 'Add'
                  ]:
                      try:
                          loc = page.get_by_text(label, exact=True)
                          if loc.first.is_visible(timeout=3000):
                              loc.first.click()
                              clicked.append(label)
                              page.wait_for_timeout(6000)
                      except Exception:
                          pass

                  page.wait_for_timeout(15000)
                  OUT['browser_state'] = {
                      'clicked': clicked,
                      'final_url': page.url,
                      'title': page.title(),
                  }
                  try:
                      OUT['browser_state']['excerpt'] = page.locator('body').inner_text(timeout=5000)[:3000]
                  except Exception:
                      pass

                  fresh = context.cookies()
                  with open('browser_cookies.json', 'w', encoding='utf-8') as f:
                      json.dump({'start_url': GROUP_URL, 'cookies': fresh}, f, indent=2)
                  OUT['final_cookie_count'] = len(fresh)
                  OUT['cloud_cookie_count'] = sum(1 for c in fresh if 'cloud.mongodb.com' in (c.get('domain') or ''))
                  OUT['recent_responses'] = responses[-30:]
                  browser.close()

          except Exception as e:
              OUT['error'] = str(e)
              OUT['traceback'] = traceback.format_exc()

          OUT['finished_at'] = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
          save()
          print(json.dumps({k: OUT.get(k) for k in ['gmail_token_status','generated_password','seed_cookie_count','cloud_cookie_count','error']}, default=str))
          PY

      - name: Run housing query through Atlas browser proxy
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
        run: |
          node housing_query.js > housing_result.json || true

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add housing_result.json housing_auth_debug.json browser_cookies.json .github/workflows/housing_average_rent_answer.yml housing_query.js
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Run housing average rent answer workflow" || exit 0
          git push
